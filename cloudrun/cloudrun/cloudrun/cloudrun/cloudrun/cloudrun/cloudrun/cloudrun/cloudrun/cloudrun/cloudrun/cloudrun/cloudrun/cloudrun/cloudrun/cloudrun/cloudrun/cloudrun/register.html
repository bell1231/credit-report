<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册账户 - 企业授信报告系统</title>
  <style>
    :root {
      --primary: #1a2d4e; --accent: #1d6fa4; --gold: #c8941a;
      --bg: #f5f7fa; --text: #2c3e50; --text-light: #6b7d8e;
      --danger: #c0392b; --success: #1e8449; --shadow: 0 4px 24px rgba(0,0,0,0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
      background: linear-gradient(145deg, #051827 0%, #0a2a4a 40%, #0d3561 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .box {
      background: #fff; border-radius: 14px; box-shadow: var(--shadow);
      width: 420px; padding: 44px 40px 36px;
    }
    .box .logo {
      text-align: center; margin-bottom: 6px;
      font-size: 22px; font-weight: 700; color: var(--primary);
    }
    .box .logo .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--gold); margin-right: 8px; vertical-align: middle; }
    .box .subtitle { text-align: center; font-size: 13px; color: var(--text-light); margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 11px 38px 11px 14px; border: 1.5px solid #dce3ec;
      border-radius: 6px; font-size: 14px; outline: none; font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; }
    .btn {
      padding: 10px 18px; border: none; border-radius: 6px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; font-family: inherit; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #165a85; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-outline { background: #fff; border: 1.5px solid var(--accent); color: var(--accent); }
    .btn-outline:hover { background: #f0f6fb; }
    .btn-full { width: 100%; margin-top: 6px; }
    .eye-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 16px; color: #999; padding: 4px;
    }
    .pw-wrapper { position: relative; }
    .msg {
      border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none;
    }
    .msg.show { display: block; }
    .msg-error { background: #fdecea; border: 1px solid #f5c6cb; color: var(--danger); }
    .msg-success { background: #e8f5e9; border: 1px solid #c8e6c9; color: var(--success); }
    .step { display: none; }
    .step.active { display: block; }
    .back-link { text-align: center; margin-top: 16px; font-size: 13px; }
    .back-link a { color: var(--accent); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="box">
  <div class="logo"><span class="dot"></span>注册新账户</div>
  <div class="subtitle">注册后即可使用企业授信报告系统</div>

  <div id="msgBox" class="msg"></div>

  <!-- Step 1: 输入邮箱 + 验证码 -->
  <div class="step active" id="step1">
    <div class="form-group">
      <label>邮箱地址</label>
      <input type="email" id="email" placeholder="请输入一个有效的邮箱地址" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>验证码</label>
      <div class="input-row">
        <input type="text" id="code" placeholder="请输入6位验证码" maxlength="6" />
        <button class="btn btn-outline" id="sendBtn" onclick="sendCode()">获取验证码</button>
      </div>
    </div>
    <button class="btn btn-primary btn-full" onclick="verifyAndNext()">验证并下一步</button>
  </div>

  <!-- Step 2: 设置密码 -->
  <div class="step" id="step2">
    <div class="form-group">
      <label>设置密码</label>
      <div class="pw-wrapper">
        <input type="password" id="password" placeholder="8位以上，需含大小写字母、数字、特殊符号中至少三种" autocomplete="new-password" />
        <button class="eye-btn" onclick="togglePw('password',this)" title="显示/隐藏密码">👁️</button>
      </div>
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <div class="pw-wrapper">
        <input type="password" id="confirmPassword" placeholder="请再次输入以确认" autocomplete="new-password" />
        <button class="eye-btn" onclick="togglePw('confirmPassword',this)" title="显示/隐藏密码">👁️</button>
      </div>
    </div>
    <button class="btn btn-primary btn-full" onclick="doRegister()">完成注册</button>
  </div>

  <div class="back-link"><a href="/login.html">← 返回登录</a></div>
</div>

<script>
let countdownTimer = null;

function showMsg(text, type) {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.className = 'msg msg-' + type + ' show';
}

function hideMsg() { document.getElementById('msgBox').classList.remove('show'); }

function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁️' : '🙈';
}

async function sendCode() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showMsg('请输入邮箱地址', 'error'); return; }

  hideMsg();
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  try {
    const res = await fetch('/api/send-code', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, type: 'register' }),
    });
    const data = await res.json();
    if (data.success) {
      showMsg('验证码已发送，请查收邮件', 'success');
      let sec = 60;
      btn.textContent = sec + 's';
      countdownTimer = setInterval(() => {
        sec--;
        if (sec <= 0) { clearInterval(countdownTimer); btn.disabled = false; btn.textContent = '获取验证码'; }
        else btn.textContent = sec + 's';
      }, 1000);
    } else {
      showMsg(data.message, 'error');
      btn.disabled = false;
    }
  } catch { showMsg('网络错误', 'error'); btn.disabled = false; }
}

async function verifyAndNext() {
  const email = document.getElementById('email').value.trim();
  const code = document.getElementById('code').value.trim();
  if (!email || !code) { showMsg('请填写邮箱和验证码', 'error'); return; }

  hideMsg();
  try {
    const res = await fetch('/api/check-code', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, code, type: 'register' }),
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      hideMsg();
    } else {
      showMsg(data.message, 'error');
    }
  } catch { showMsg('网络错误', 'error'); }
}

async function doRegister() {
  const email = document.getElementById('email').value.trim();
  const code = document.getElementById('code').value.trim();
  const p1 = document.getElementById('password').value;
  const p2 = document.getElementById('confirmPassword').value;

  if (!p1 || !p2) { showMsg('请输入密码', 'error'); return; }
  if (p1 !== p2) { showMsg('密码不同，请再次输入', 'error'); return; }
  if (p1.length < 8) { showMsg('密码长度至少8位', 'error'); return; }
  let types = 0;
  if (/[A-Z]/.test(p1)) types++;
  if (/[a-z]/.test(p1)) types++;
  if (/[0-9]/.test(p1)) types++;
  if (/[^A-Za-z0-9]/.test(p1)) types++;
  if (types < 3) { showMsg('密码需包含大写字母、小写字母、数字、特殊符号中至少三种', 'error'); return; }
  if (/['\"|\\;`]/.test(p1)) { showMsg('符号不能包含此类特殊符号', 'error'); return; }

  hideMsg();
  try {
    const res = await fetch('/api/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: p1, code }),
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('auth_token', data.token);
      localStorage.setItem('user_email', data.email);
      showMsg('注册成功！正在跳转...', 'success');
      setTimeout(() => { window.location.href = '/app.html'; }, 1000);
    } else {
      showMsg(data.message, 'error');
    }
  } catch { showMsg('网络错误', 'error'); }
}
</script>
</body>
</html>
